name: SearchAndReplace CI

on:
  push:
    branches-ignore:
      - release-*

permissions:
  contents: write

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: 20.x

      - name: Clear Yarn cache
        run: yarn cache clean

      - name: Install NPM
        run: |
          yarn install

      - name: Check Linting
        run: |
          yarn lint:js

      - name: Run Test Suites
        run: |
          yarn test:js

      - name: Install Playwright browsers
        run: |
          yarn playwright install --with-deps

      - name: Start wp-env
        run: |
          yarn wp-env start

      - name: Wait for WP
        run: |
          npx wait-on http://srbe.localhost:5187

      - name: Run e2e tests
        run: |
          yarn wp-env cli wp rewrite structure '/%postname%' --hard
          yarn wp-env cli wp rewrite flush --hard
          yarn test:e2e

      - name: Set up PHP v8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Validate Composer
        run: |
          composer validate --strict

      - name: Install Composer
        run: |
          composer install --prefer-dist --no-progress

      - name: Check PHP Linting
        run: |
          composer run lint
